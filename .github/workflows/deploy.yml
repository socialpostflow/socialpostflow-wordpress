name: Deploy to WordPress.org

on:
  release:
    types: [ published ]

jobs:
  tag:
    # Name
    name: Plugin Deployment

    # Virtual Environment to use
    # @see: https://github.com/actions/virtual-environments
    runs-on: ubuntu-latest

    # Grant the default GITHUB_TOKEN write access to releases so that
    # softprops/action-gh-release can attach the built .zip to the GitHub Release.
    permissions:
      contents: write

    # Steps to deploy
    steps:
      # Checkout (copy) this repository's Plugin to this VM.
      - name: Checkout Plugin
        uses: actions/checkout@v7

      # Deploy to wordpress.org, if expected files exist.
      - name: WordPress Plugin Deploy
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: social-post-flow

      # Attach the built .zip to the GitHub Release that triggered this workflow.
      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.deploy.outputs.zip-path }}